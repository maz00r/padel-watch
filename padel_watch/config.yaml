name: Padel Watch (Decathlon)
version: "1.8.0"
slug: padel_watch
description: Monitoruje wolne terminy padla na Decathlon GO i wysyła powiadomienia push (ntfy.sh).
url: https://github.com/maz00r/padel-watch
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
options:
  ntfy_topic: "your-ntfy-topic-here"
  check_interval: 60
  filters: "mon-fri:15:00-02:00; sat-sun:00:00-24:00"
  intervals: ""
  listing_url: "https://go.decathlon.pl/l/1c0ec93e-ca77-44b9-a3a6-c72a99d050dd"
  timezone: "Europe/Warsaw"
  auto_register: false
  auto_register_dry_run: true
  decathlon_token: ""
  decathlon_cookie: ""
  auto_register_name: ""
  auto_register_age: ""
  auto_register_paid: false
  auto_register_max: 1
  auto_register_order: "earliest"
  clear_state: ""
schema:
  ntfy_topic: str
  check_interval: int(10,3600)
  filters: str?
  intervals: str?
  listing_url: url
  timezone: str
  auto_register: bool
  auto_register_dry_run: bool
  decathlon_token: str?
  decathlon_cookie: str?
  auto_register_name: str?
  auto_register_age: str?
  auto_register_paid: bool
  auto_register_max: int(0,10)
  auto_register_order: list(earliest|latest)
  clear_state: list(|registered|all)
