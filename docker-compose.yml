services:
  padel-watch:
    build: .
    # albo zamiast build użyj gotowego obrazu po zbudowaniu:
    # image: padel-watch
    container_name: padel-watch
    restart: unless-stopped
    environment:
      # WYMAGANE: nazwa Twojego prywatnego tematu ntfy (ta sama co w apce na telefonie)
      NTFY_TOPIC: "your-ntfy-topic-here"
      # Jak często sprawdzać (sekundy). 60 = co 1 min. Bądź rozsądny dla API Decathlonu.
      CHECK_INTERVAL: "60"
      # Godziny powiadomień. Jeśli ustawisz FILTERS, NADPISUJE filtry z config.json.
      # Format: 'DNI:HH:MM-HH:MM' rozdzielone ';'. Okno przez północ OK (15:00-02:00).
      # FILTERS: "mon-fri:15:00-02:00; sat-sun:00:00-24:00"
    volumes:
      # stan (state.json) trwały między restartami
      - ./data:/data
      # opcjonalnie: edytuj config.json bez przebudowy obrazu
      - ./config.json:/app/config.json:ro
