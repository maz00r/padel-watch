name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Testy jednostkowe
        run: python3 -m unittest -v test_check_padel
      - name: Składnia silnika
        run: python3 -m py_compile padel_watch/check_padel.py
