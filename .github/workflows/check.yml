name: Sprawdzaj wolne terminy padla

on:
  schedule:
    - cron: "*/5 * * * *"   # co ~5 min (GitHub Actions: minimum 5 min, bywa opóźniane)
  workflow_dispatch: {}      # ręczne uruchomienie (zakładka Actions -> Run workflow)

permissions:
  contents: write            # do commitowania state.json z powrotem

concurrency:
  group: padel-check
  cancel-in-progress: false  # nie nakładaj biegów

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sprawdź terminy i wyślij powiadomienia
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 check_padel.py

      - name: Zapisz stan (commit state.json jeśli się zmienił)
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Aktualizacja stanu terminów [skip ci]"
            git push
          else
            echo "Stan bez zmian — nic do commitowania."
          fi
