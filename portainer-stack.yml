# Stack gotowy do wklejenia w Portainer: Stacks -> Add stack -> Web editor.
#
# Obraz jest PUBLICZNY na Docker Hub i wieloarchitekturowy (linux/amd64 + linux/arm64),
# więc Portainer sam go pobierze — NIE trzeba niczego kopiować ani budować na serwerze.
#
# config.json jest WBUDOWANY w obraz. Stan (state.json) trzymany w nazwanym wolumenie.

services:
  padel-watch:
    image: maz00r94/padel-watch:latest
    container_name: padel-watch
    restart: unless-stopped
    environment:
      NTFY_TOPIC: "your-ntfy-topic-here"   # <-- WPISZ swój temat ntfy
      CHECK_INTERVAL: "60"                          # sekundy między sprawdzeniami
      # Godziny powiadomień (strefa Europe/Warsaw). Okna oddzielone ';',
      # każde: DNI:HH:MM-HH:MM. DNI: zakres (mon-fri) lub lista (sat,sun).
      # Okno przez północ jest OK (np. 15:00-02:00). Pusta/brak = filtr z config.json.
      FILTERS: "mon-fri:15:00-02:00; sat-sun:00:00-24:00"
    volumes:
      - padel_data:/data
      # Opcjonalnie: aby zmieniać filtry bez przebudowy obrazu, połóż własny config.json
      # na serwerze i odkomentuj poniższą linię (dostosuj ścieżkę):
      # - /opt/padel/config.json:/app/config.json:ro

volumes:
  padel_data:
